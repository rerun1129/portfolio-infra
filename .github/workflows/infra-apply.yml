name: Infra apply (legacy-to-next spin-up)

# environments/legacy-to-next 스택을 plan 또는 apply.
#  - mode=plan  : 변경 미리보기만(STEP SUMMARY에 출력)
#  - mode=apply : 실제 생성/갱신 — confirm 입력에 'APPLY' 필요
#
# ※ 최초 1회(OIDC 역할 생성, enable_cicd_oidc=true)는 로컬에서 apply — 역할이 없으면 CI가 인증 못 함.
#   그 후부터 이 워크플로가 legacy-to-next-gha-infra 역할로 OIDC 동작.
# ※ 사전 시크릿: AMPLIFY_OAUTH_TOKEN (없으면 plan이 Amplify 삭제를 띄우고 apply가 가드에서 중단됨).
on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'plan(미리보기) 또는 apply(실제 적용)'
        type: choice
        options: [plan, apply]
        default: plan
      confirm:
        description: "apply 시에만: 'APPLY' 입력해야 적용"
        type: string
        default: ''

permissions:
  id-token: write
  contents: read

concurrency:
  group: infra-legacy-to-next-lifecycle
  cancel-in-progress: false

env:
  AWS_REGION: ap-northeast-2
  TF_WORKDIR: environments/legacy-to-next
  INFRA_ROLE: arn:aws:iam::740636428516:role/legacy-to-next-gha-infra
  # CI에선 로컬 profile/assume 비활성(OIDC 환경자격 직접 사용).
  TF_VAR_aws_profile: ''
  TF_VAR_iam_role_arn: ''
  # CI 역할(OIDC) 보존 — false면 자기 자신을 destroy한다.
  TF_VAR_enable_cicd_oidc: 'true'
  # Amplify 보존 — 빈 값이면 plan이 Amplify 삭제를 계획하고 apply 가드가 중단.
  TF_VAR_amplify_oauth_token: ${{ secrets.AMPLIFY_OAUTH_TOKEN }}

jobs:
  terraform:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    defaults:
      run:
        working-directory: ${{ env.TF_WORKDIR }}
    steps:
      - name: Guard — apply requires confirm=APPLY
        if: ${{ inputs.mode == 'apply' && inputs.confirm != 'APPLY' }}
        run: |
          echo "::error::apply 모드는 confirm 입력에 'APPLY' 가 필요합니다 (받은 값: '${{ inputs.confirm }}')."
          exit 1

      - uses: actions/checkout@v6

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.8
          terraform_wrapper: false

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.INFRA_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform init
        run: terraform init -input=false

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        run: |
          terraform plan -input=false -no-color -out=tfplan | tee plan.txt
          {
            echo "### Terraform plan (mode=${{ inputs.mode }})"
            echo '```'
            tail -c 60000 plan.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Guard — block Amplify / CI-role deletion
        run: |
          terraform show -json tfplan > plan.json
          # 순수 삭제(actions == ["delete"])만 — replace(delete+create)는 제외(오탐 방지).
          DESTROYS=$(jq -r '.resource_changes[]? | select(.change.actions == ["delete"]) | .address' plan.json)
          echo "삭제 예정 리소스:"; echo "${DESTROYS:-(none)}"
          if echo "$DESTROYS" | grep -Eq 'aws_amplify_|gha_infra|gha_ecr_push|aws_iam_openid_connect_provider'; then
            if [ "${{ inputs.mode }}" = "apply" ]; then
              echo "::error::plan이 Amplify 또는 CI OIDC 역할 삭제를 계획함 — AMPLIFY_OAUTH_TOKEN 시크릿/enable_cicd_oidc 확인. apply 중단."
              exit 1
            else
              echo "::warning::plan이 Amplify/CI역할 삭제를 포함 — apply 전 AMPLIFY_OAUTH_TOKEN 시크릿 확인 필요."
            fi
          fi

      - name: Terraform apply
        if: ${{ inputs.mode == 'apply' }}
        run: |
          terraform apply -input=false tfplan
          {
            echo "### Outputs"
            echo '```'
            terraform output 2>/dev/null || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
